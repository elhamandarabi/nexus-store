<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — NEXUS</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="../index.html" class="logo">NEX<span>US</span></a>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <a href="cart.html" class="icon-btn cart-icon">
          <i class="fas fa-shopping-bag"></i>
          <span class="cart-count" id="cartCount">0</span>
        </a>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    <h1 class="page-title">Your <span class="accent">Cart</span></h1>
    <p class="page-subtitle">Review your items before checkout.</p>

    <div class="cart-layout">
      <div id="cartItems"></div>
      <div class="cart-summary" id="cartSummary">
        <h3>Order Summary</h3>
        <div class="summary-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
        <div class="summary-row"><span>Shipping</span><span id="shipping">$0.00</span></div>
        <div class="summary-row total"><span>Total</span><span id="total">$0.00</span></div>
        <button class="btn-primary checkout-btn" onclick="checkout()">
          Proceed to Checkout <i class="fas fa-arrow-right"></i>
        </button>
        <p style="color:var(--text3);font-size:0.8rem;text-align:center;margin-top:1rem;">
          <i class="fas fa-lock"></i> Secure checkout
        </p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/main.js"></script>
  <script src="../js/cart.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
